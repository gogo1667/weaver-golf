# Build Weaver Golf for iOS and produce an IPA (no Mac required).
# Add secrets: BUILD_CERTIFICATE_BASE64, P12_PASSWORD, BUILD_PROVISION_PROFILE_BASE64, KEYCHAIN_PASSWORD
# See docs/APPSTORE-SETUP.md for getting certs/profiles from Windows.

name: Build iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    name: Build iOS app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Strip newlines/spaces from base64 so pasted secrets don't corrupt the decode
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n\r ' | base64 --decode -o $CERTIFICATE_PATH
          echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n\r ' | base64 --decode -o $PP_PATH

          P12_PASSWORD_TRIM=$(echo -n "$P12_PASSWORD" | tr -d '\n\r')
          # Verify .p12 + password with openssl
          openssl pkcs12 -info -in $CERTIFICATE_PATH -passin pass:"$P12_PASSWORD_TRIM" -nokeys || { echo "openssl pkcs12 -info failed"; exit 1; }
          # Re-export .p12 on runner so macOS security import accepts it (OpenSSL-on-Windows .p12 can be rejected)
          openssl pkcs12 -in $CERTIFICATE_PATH -passin pass:"$P12_PASSWORD_TRIM" -out $RUNNER_TEMP/repack.p12 -export -passout pass:"$P12_PASSWORD_TRIM"

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security import $RUNNER_TEMP/repack.p12 -P "$P12_PASSWORD_TRIM" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync to iOS
        run: npx cap sync ios

      - name: Archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath "$RUNNER_TEMP/output" \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: weaver-golf-ios
          path: ${{ runner.temp }}/output/
          retention-days: 30

      # (Optional) TestFlight upload step can be added later once IPA build is confirmed.
